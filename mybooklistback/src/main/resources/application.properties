spring.application.name=mybooklistback

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/mybooklist?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.expiration=86400000

# Server
server.port=8080

# Secret values → application-secret.properties 에서 관리
spring.config.import=application-secret.properties

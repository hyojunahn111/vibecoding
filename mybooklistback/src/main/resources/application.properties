spring.application.name=mybooklistback

# MySQL
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/mybooklist?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD}

# Startup
spring.main.lazy-initialization=true

# Connection Pool (Clever Cloud free tier: max 5 connections)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000

# JPA
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.expiration=86400000
jwt.secret=${JWT_SECRET}

# Kakao
kakao.rest-api-key=${KAKAO_REST_API_KEY}

# Server
server.port=${PORT:8080}

# Secret values → 로컬에서는 application-secret.properties 에서 관리
spring.config.import=optional:application-secret.properties
